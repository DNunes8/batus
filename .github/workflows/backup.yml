# Weekly encrypted backup of the Supabase database (public + auth schemas).
#
# Every Monday — and on demand (Actions tab -> Run workflow) — this:
#   1. dumps the `public` AND `auth` schemas with pg_dump (auth carries the
#      login accounts — without it a restore recovers profiles but no logins)
#   2. encrypts the dump with the BACKUP_PASSPHRASE secret (gpg, AES-256)
#   3. stores the encrypted file as a workflow artifact, kept for 90 days
#
# A `keepalive` job also pushes an empty commit when the repo has been quiet
# for ~25 days: GitHub auto-disables scheduled workflows after 60 days of
# repository inactivity, which would silently kill BOTH this backup and the
# payment-reminder cron on a hand-off app that stops receiving commits.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   SUPABASE_DB_PASSWORD - the Supabase database password
#   BACKUP_PASSPHRASE    - the passphrase that encrypts/decrypts the backup
#
# To restore a backup:
#   1. Actions tab -> open a backup run -> download the "db-backup" artifact
#   2. decrypt:  gpg --output backup.sql --decrypt backup.sql.gpg
#                (gpg prompts for the BACKUP_PASSPHRASE)
#   3. load:     psql "<a Supabase connection string>" -f backup.sql

name: Database backup

on:
  schedule:
    - cron: "0 4 * * 1"  # every Monday, 04:00 UTC
  workflow_dispatch:       # adds a manual "Run workflow" button

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Install PostgreSQL 17 client
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Dump the database
        env:
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          # Strip any stray whitespace/newline that can sneak in when the
          # password is pasted into the secret box.
          CLEAN_PW="$(printf '%s' "$DB_PASSWORD" | tr -d ' \t\n\r')"
          echo "Password length - stored: ${#DB_PASSWORD}, after trim: ${#CLEAN_PW}"
          PGPASSWORD="$CLEAN_PW" pg_dump \
            --host=aws-1-eu-central-1.pooler.supabase.com \
            --port=5432 \
            --username=postgres.udgrwwkuvtycidxfaffx \
            --dbname=postgres \
            --schema=public \
            --schema=auth \
            --no-owner \
            --no-privileges \
            --file=backup.sql
          echo "Dump complete - size: $(du -h backup.sql | cut -f1)"
          # Sanity: the auth schema (logins) must actually be in the dump.
          grep -q "CREATE TABLE auth\." backup.sql \
            || { echo "::error::auth schema missing from dump"; exit 1; }

      - name: Encrypt the dump
        env:
          PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
        run: |
          printf '%s' "$PASSPHRASE" \
            | gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 \
                  --symmetric --cipher-algo AES256 \
                  --output backup.sql.gpg backup.sql
          rm -f backup.sql

      - name: Upload the encrypted backup
        uses: actions/upload-artifact@v4
        with:
          name: db-backup
          path: backup.sql.gpg
          retention-days: 90

  # Prevents GitHub's 60-day inactivity auto-disable of scheduled workflows.
  # Only commits when the repo has been quiet for ~25 days, so it stays
  # invisible while development is active (~1 empty commit/month otherwise).
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Empty commit if repo quiet for 25+ days
        run: |
          last_commit=$(git log -1 --format=%ct)
          age_days=$(( ( $(date +%s) - last_commit ) / 86400 ))
          echo "Last commit was ${age_days} days ago."
          if [ "$age_days" -lt 25 ]; then
            echo "Repo active — no keepalive needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keepalive (prevents 60-day scheduled-workflow auto-disable)"
          git push
